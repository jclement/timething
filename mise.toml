[tools]
node = "lts"
"npm:wrangler" = "latest"

[env]
_.file = { path = "fnox.local.toml", optional = true }

[tasks.install]
description = "Install frontend dependencies"
run = "npm install"

[tasks.dev]
description = "Start Vite + Worker dev server"
run = "npm run dev"

[tasks.build]
description = "Production build"
run = "npm run build"

[tasks.preview]
description = "Preview production build locally"
run = "npm run preview"

[tasks.test]
description = "Run all tests (unit + e2e)"
depends = ["test:unit", "test:e2e"]

[tasks."test:unit"]
description = "Run unit tests"
run = "npm run test:unit"

[tasks."test:e2e"]
description = "Run E2E tests"
run = "npm run test:e2e"

[tasks.lint]
description = "Typecheck + lint"
run = "npm run lint"

[tasks.fmt]
description = "Format code"
run = "npm run fmt"

[tasks."dev:reset"]
description = "Blow away local dev state"
run = "rm -rf dist/ .wrangler/ node_modules/.vite"

[tasks.deploy]
description = "Deploy to Cloudflare"
run = "npm run build && wrangler deploy"

[tasks.release]
description = "Tag and push a release"
run = """
#!/bin/bash
set -e
current=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
echo "Current: $current"
major=$(echo $current | sed 's/v//' | cut -d. -f1)
minor=$(echo $current | cut -d. -f2)
patch=$(echo $current | cut -d. -f3)
echo "  1) patch -> v${major}.${minor}.$((patch+1))"
echo "  2) minor -> v${major}.$((minor+1)).0"
echo "  3) major -> v$((major+1)).0.0"
read -p "Choice [1]: " c; c=${c:-1}
case $c in
  1) v="v${major}.${minor}.$((patch+1))" ;;
  2) v="v${major}.$((minor+1)).0" ;;
  3) v="v$((major+1)).0.0" ;;
  *) echo "Invalid"; exit 1 ;;
esac
git tag -a "$v" -m "Release $v"
read -p "Push $v? [Y/n]: " p; p=${p:-Y}
[[ $p =~ ^[Yy]$ ]] && git push origin "$v"
"""
