<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Rounded-square background that reads clearly as an app icon in the OS -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <!-- Subtle inner bezel for depth -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#1d4ed8" stroke-width="1"/>

  <!-- Primary clock face -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#ffffff" stroke-width="3"/>

  <!-- Hour ticks at 12 / 3 / 6 / 9 -->
  <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="15"  x2="32" y2="18"/>
    <line x1="49" y1="32"  x2="46" y2="32"/>
    <line x1="32" y1="49"  x2="32" y2="46"/>
    <line x1="15" y1="32"  x2="18" y2="32"/>
  </g>

  <!-- Second "zone" hand in lighter blue — the whole point of this app -->
  <line x1="32" y1="32" x2="44" y2="41" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  <!-- Primary hands -->
  <line x1="32" y1="32" x2="32" y2="19" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="41" y2="32" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- Center pin -->
  <circle cx="32" cy="32" r="2.5" fill="#ffffff"/>
</svg>
