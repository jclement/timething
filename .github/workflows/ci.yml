name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so `git describe --tags` (in vite.config.ts)
          # produces a real version string instead of just the short SHA.
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          install: true
      - run: mise run install
      - run: mise run lint
      - run: mise run test:unit
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit
      - run: mise run test:e2e
      - run: mise run build
